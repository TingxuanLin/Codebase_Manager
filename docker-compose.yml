services:
  postgres:
    image: postgres:16-alpine
    container_name: codebase-manager-postgres
    environment:
      POSTGRES_DB: codebase_manager
      POSTGRES_USER: codebase_manager
      POSTGRES_PASSWORD: codebase_manager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codebase_manager -d codebase_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
