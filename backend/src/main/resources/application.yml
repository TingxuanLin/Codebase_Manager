spring:
  application:
    name: Codebase_Manager
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/codebase_manager}
    username: ${DATABASE_USERNAME:codebase_manager}
    password: ${DATABASE_PASSWORD:codebase_manager}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
